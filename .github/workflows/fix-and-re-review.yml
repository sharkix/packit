name: Re-request Copilot Review After Fix

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  re-review:
    name: Re-request Copilot review after new push
    runs-on: ubuntu-latest
    steps:
      - name: Find open PR for this branch
        id: find-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
            });

            if (pulls.length === 0) {
              console.log('No open PR for this branch, skipping.');
              return null;
            }

            const pr = pulls[0];
            console.log(`Found PR #${pr.number}`);
            core.setOutput('pr_number', pr.number);
            return pr.number;

      - name: Re-request Copilot review
        if: steps.find-pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = parseInt('${{ steps.find-pr.outputs.pr_number }}');

            if (!pull_number) {
              console.log('No PR number, skipping.');
              return;
            }

            // Re-request Copilot as reviewer (dismisses old review and requests fresh one)
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ['copilot-pull-request-reviewer[bot]'],
              });
              console.log(`Copilot re-review requested on PR #${pull_number}.`);
            } catch (err) {
              console.warn('Could not re-request Copilot reviewer:', err.message);
            }
