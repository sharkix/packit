name: Auto Merge on Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge after approval
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'
    steps:
      - name: Merge PR (auto-merge with direct fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try auto-merge first (waits for required checks if any exist);
          # if the PR is already in clean status, merge it directly.
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto \
          || gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash
