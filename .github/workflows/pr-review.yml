name: Copilot PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-review:
    name: Request Copilot Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Request Copilot review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Request Copilot as a reviewer
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ['copilot-pull-request-reviewer[bot]'],
              });
              console.log('Copilot review requested successfully.');
            } catch (err) {
              // Copilot reviewer may not be available in all repos — log and continue
              console.warn('Could not request Copilot reviewer:', err.message);
            }

  trigger-copilot-fix:
    name: Ask Copilot Agent to fix review comments
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested'
    steps:
      - name: Post @copilot fix comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const reviewer = context.payload.review.user.login;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: `@github-copilot address the review comments left by @${reviewer} and push the fixes to this branch.`,
            });
            console.log('Copilot fix comment posted.');
