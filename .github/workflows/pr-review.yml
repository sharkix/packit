name: Copilot PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    name: Request Copilot Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Request Copilot as a reviewer
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ['copilot-pull-request-reviewer[bot]'],
              });
              console.log('Copilot review requested successfully.');
            } catch (err) {
              // Copilot reviewer may not be available in all repos — log and continue
              console.warn('Could not request Copilot reviewer:', err.message);
            }
